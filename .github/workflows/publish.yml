name: Create Release

on:
  push:
    tags:
      - 'v*'   # assumes npm version creates vX.Y.Z tags
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

# jobs:
